name: Проверки

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # обёртка Gradle приходит в репозитории бинарником — стоит убедиться,
      # что это настоящий gradle, а не чей-то подменённый
      - uses: gradle/actions/wrapper-validation@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Тесты
        run: ./gradlew test --no-daemon

      # тесты, ходящие в сеть и тратящие токены, сюда не попадают:
      # они помечены тегом integration и требуют настоящих ключей
      - name: Отчёт, если что-то упало
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: отчёт-о-проверках
          path: build/reports/tests/test/
