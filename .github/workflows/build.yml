name: Сборка

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      # то же, что уезжает на сервер: bin/ и lib/ рядом с промптами-образцами
      - name: Собрать дистрибутив
        run: ./gradlew installDist --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: raine
          path: build/install/raine/
          retention-days: 14
